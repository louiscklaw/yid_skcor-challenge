<!DOCTYPE html>
<html>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

<body>

  <div ng-app="app">
    <div ng-controller="UserDashboardController">
      <input ng-model="searchQuery" ng-change="onSearch()" placeholder="Search users...">

      {{searching}}

      <div ng-repeat="user in filteredUsers">
        <h3>{{ user.name }}</h3>
        <p>{{ user.email }}</p>
        <button ng-click="makeAdmin(user)">Make Admin</button>
      </div>
      <div ng-if="filteredUsers.length == 0">No users found</div>
    </div>
  </div>

  <script src="./script.js"></script>

</body>

</html>
