<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Event Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#6e9fff",
              surface: "#f5f7f9",
              "primary-fixed-dim": "#5391ff",
              "secondary-fixed": "#ffc885",
              "on-secondary-fixed": "#4c2e00",
              "surface-variant": "#d9dde0",
              "error-container": "#fb5151",
              "surface-bright": "#f5f7f9",
              "secondary-dim": "#714600",
              "on-secondary-fixed-variant": "#724700",
              "on-secondary": "#fff0e3",
              "outline-variant": "#abadaf",
              tertiary: "#b51621",
              "on-surface": "#2c2f31",
              "on-tertiary-fixed": "#3a0003",
              "on-error": "#ffefee",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#ff928b",
              "secondary-container": "#ffc885",
              "error-dim": "#9f0519",
              "on-error-container": "#570008",
              "surface-tint": "#0057bd",
              "primary-fixed": "#6e9fff",
              "tertiary-dim": "#a30117",
              "on-primary": "#f0f2ff",
              error: "#b31b25",
              "surface-container": "#e5e9eb",
              "inverse-surface": "#0b0f10",
              "tertiary-fixed": "#ff928b",
              "secondary-fixed-dim": "#ffb554",
              "on-tertiary-container": "#69000a",
              "inverse-primary": "#4d8eff",
              background: "#f5f7f9",
              "surface-container-low": "#eef1f3",
              "on-background": "#2c2f31",
              "surface-container-high": "#dfe3e6",
              "surface-dim": "#d0d5d8",
              "on-primary-container": "#002150",
              "tertiary-fixed-dim": "#ff7b74",
              secondary: "#815100",
              "on-primary-fixed-variant": "#002a62",
              primary: "#0057bd",
              "inverse-on-surface": "#9a9d9f",
              outline: "#747779",
              "on-secondary-container": "#663f00",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#79000e",
              "primary-dim": "#004ca6",
              "on-tertiary": "#ffefed",
              "surface-container-highest": "#d9dde0",
              "on-surface-variant": "#595c5e",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .material-symbols-outlined {
          font-variation-settings:
            "FILL" 0,
            "wght" 400,
            "GRAD" 0,
            "opsz" 24;
        }
        .drawer-state:checked ~ #event-drawer {
          transform: translateY(0);
        }
        .drawer-state:checked ~ #drawer-overlay {
          opacity: 1;
          pointer-events: auto;
        }
        .drawer-state:checked ~ #fab-trigger {
          transform: rotate(135deg);
          background-color: theme("colors.error");
        }
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #f5f7f9;
        color: #2c2f31;
        min-height: 100dvh;
      }
      .font-headline {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface relative overflow-x-hidden">

    <app-root></app-root>
  </body>
</html>
