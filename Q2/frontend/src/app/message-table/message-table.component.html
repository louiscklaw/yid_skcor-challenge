<!-- REQ_04: Show a count of events by priority -->
<div class="alarm-stats">
  <div>priority stats:</div>
  <div>low: {{low_count}}</div>
  <div>normal: {{normal_count}}</div>
  <div>high: {{high_count}}</div>
</div>

<!-- REQ_01: Display the live event feed, updating in real-time as new events arrive -->
<section class="example-container mat-elevation-z8" tabindex="0">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

    <!-- Position Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> No. </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="msgType">
      <th mat-header-cell *matHeaderCellDef> type </th>
      <td mat-cell *matCellDef="let element"> {{element.msgType}} </td>
    </ng-container>

    <!-- msgBody Column -->
    <ng-container matColumnDef="msgBody">
      <th mat-header-cell *matHeaderCellDef> body </th>
      <td mat-cell *matCellDef="let element"> {{element.msgBody}} </td>
    </ng-container>

    <!-- REQ_02: Visually distinguish events by priority (your design choice — just make it clear) -->
    <!-- msgPrio Column -->
    <ng-container matColumnDef="msgPrio">
      <th mat-header-cell *matHeaderCellDef> priority </th>
      <td mat-cell *matCellDef="let element">

        <!-- REQ_02: Visually distinguish events by priority (your design choice — just make it clear) -->
        <span [style.color]="getPriorityColor(element.msgPrio)">{{element.msgPrio}}</span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
